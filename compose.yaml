x-docker-test-command: &docker-test-command
  - bash
  - -lc
  - |
      set -euo pipefail
      export PYTHONPATH="$${PYTHONPATH:-/app}"
      export HASHCRUSH_E2E_MODE="$${HASHCRUSH_E2E_MODE:-local}"
      echo "Test database backend: postgres"
      echo "[1/2] Running non-E2E tests"
      python3 -m pytest -q -m "not e2e and not e2e_external" -rs
      if [[ "$${HASHCRUSH_E2E_MODE}" == "external" ]]; then
        echo "[2/2] Running E2E tests against external host $${HASHCRUSH_E2E_BASE_URL}"
        e2e_marker="e2e_external"
      else
        echo "[2/2] Running E2E tests against self-bootstrapped local app"
        e2e_marker="e2e"
      fi
      e2e_log="$$(mktemp)"
      trap 'rm -f "$$e2e_log"' EXIT
      set +e
      python3 -m pytest -q -m "$$e2e_marker" -rs | tee "$$e2e_log"
      pytest_status=$${PIPESTATUS[0]}
      set -e
      if (( pytest_status != 0 )); then
        exit "$$pytest_status"
      fi
      if grep -q '^SKIPPED ' "$$e2e_log"; then
        echo >&2
        echo "E2E suite reported skipped tests. Fix the live credentials, fixtures, or host availability before treating the run as successful." >&2
        exit 1
      fi

services:
  db:
    image: postgres:${HASHCRUSH_POSTGRES_MAJOR:-16}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hashcrush}
      POSTGRES_USER: ${POSTGRES_USER:-hashcrush}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - hashcrush-postgres:/var/lib/postgresql/data

  bootstrap:
    build:
      context: .
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment: &hashcrush-env
      HASHCRUSH_DATABASE_URI: "postgresql+psycopg://${POSTGRES_USER:-hashcrush}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-hashcrush}"
      HASHCRUSH_SECRET_KEY: ${HASHCRUSH_SECRET_KEY:?Set HASHCRUSH_SECRET_KEY in .env}
      HASHCRUSH_DATA_ENCRYPTION_KEY: ${HASHCRUSH_DATA_ENCRYPTION_KEY:?Set HASHCRUSH_DATA_ENCRYPTION_KEY in .env}
      HASHCRUSH_HASHCAT_BIN: ${HASHCRUSH_HASHCAT_BIN:-/usr/bin/hashcat}
      HASHCRUSH_RUNTIME_PATH: /tmp/hashcrush-runtime
      HASHCRUSH_STORAGE_PATH: /var/lib/hashcrush
      HASHCRUSH_SSL_CERT_PATH: /etc/hashcrush/ssl/cert.pem
      HASHCRUSH_SSL_KEY_PATH: /etc/hashcrush/ssl/key.pem
      HASHCRUSH_TRUST_X_FORWARDED_FOR: "1"
      HASHCRUSH_INITIAL_ADMIN_USERNAME: ${HASHCRUSH_INITIAL_ADMIN_USERNAME:-admin}
      HASHCRUSH_INITIAL_ADMIN_PASSWORD: ${HASHCRUSH_INITIAL_ADMIN_PASSWORD:?Set HASHCRUSH_INITIAL_ADMIN_PASSWORD in .env}
      HASHCRUSH_BOOTSTRAP_DB_WAIT_SECONDS: ${HASHCRUSH_BOOTSTRAP_DB_WAIT_SECONDS:-60}
      HASHCRUSH_UPLOAD_OPERATION_RETENTION_SECONDS: ${HASHCRUSH_UPLOAD_OPERATION_RETENTION_SECONDS:-3600}
      HASHCRUSH_UPLOAD_OPERATION_LEASE_SECONDS: ${HASHCRUSH_UPLOAD_OPERATION_LEASE_SECONDS:-300}
      HASHCRUSH_UPLOAD_WORKER_POLL_INTERVAL_SECONDS: ${HASHCRUSH_UPLOAD_WORKER_POLL_INTERVAL_SECONDS:-2}
      HASHCRUSH_UPLOAD_WORKER_HEARTBEAT_MAX_AGE_SECONDS: ${HASHCRUSH_UPLOAD_WORKER_HEARTBEAT_MAX_AGE_SECONDS:-30}
      HASHCRUSH_WEB_WORKERS: ${HASHCRUSH_WEB_WORKERS:-2}
      HASHCRUSH_WEB_THREADS: ${HASHCRUSH_WEB_THREADS:-4}
      HASHCRUSH_WEB_TIMEOUT_SECONDS: ${HASHCRUSH_WEB_TIMEOUT_SECONDS:-120}
      HASHCRUSH_WEB_GRACEFUL_TIMEOUT_SECONDS: ${HASHCRUSH_WEB_GRACEFUL_TIMEOUT_SECONDS:-30}
      HASHCRUSH_WEB_KEEPALIVE_SECONDS: ${HASHCRUSH_WEB_KEEPALIVE_SECONDS:-5}
      HASHCRUSH_WEB_MAX_REQUESTS: ${HASHCRUSH_WEB_MAX_REQUESTS:-1000}
      HASHCRUSH_WEB_MAX_REQUESTS_JITTER: ${HASHCRUSH_WEB_MAX_REQUESTS_JITTER:-100}
    command: ["python3", "-m", "hashcrush.container_bootstrap"]
    volumes:
      - hashcrush-storage:/var/lib/hashcrush
      - hashcrush-runtime:/tmp/hashcrush-runtime
      - type: bind
        source: ${HASHCRUSH_EXTERNAL_WORDLISTS_HOST_PATH:?Set HASHCRUSH_EXTERNAL_WORDLISTS_HOST_PATH in .env}
        target: /mnt/hashcrush-wordlists
        read_only: true
      - type: bind
        source: ${HASHCRUSH_HIBP_DATASETS_HOST_PATH:?Set HASHCRUSH_HIBP_DATASETS_HOST_PATH in .env}
        target: /mnt/hashcrush-hibp
        read_only: true
      - type: bind
        source: ${HASHCRUSH_RULES_HOST_PATH:?Set HASHCRUSH_RULES_HOST_PATH in .env}
        target: /mnt/hashcrush-rules
        read_only: true
      - hashcrush-ssl:/etc/hashcrush/ssl

  web:
    build:
      context: .
    init: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    environment: *hashcrush-env
    command: ["gunicorn", "--config", "/app/docker/gunicorn.conf.py", "wsgi:app"]
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - hashcrush-storage:/var/lib/hashcrush
      - hashcrush-runtime:/tmp/hashcrush-runtime
      - type: bind
        source: ${HASHCRUSH_EXTERNAL_WORDLISTS_HOST_PATH:?Set HASHCRUSH_EXTERNAL_WORDLISTS_HOST_PATH in .env}
        target: /mnt/hashcrush-wordlists
        read_only: true
      - type: bind
        source: ${HASHCRUSH_HIBP_DATASETS_HOST_PATH:?Set HASHCRUSH_HIBP_DATASETS_HOST_PATH in .env}
        target: /mnt/hashcrush-hibp
        read_only: true
      - type: bind
        source: ${HASHCRUSH_RULES_HOST_PATH:?Set HASHCRUSH_RULES_HOST_PATH in .env}
        target: /mnt/hashcrush-rules
        read_only: true

  nginx:
    image: nginx:1.27-alpine
    init: true
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-check-certificate -q -O /dev/null https://127.0.0.1/healthz || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${HASHCRUSH_HTTPS_PORT:-8443}:443"
    volumes:
      - hashcrush-ssl:/etc/hashcrush/ssl:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  web-test:
    build:
      context: .
    profiles: ["test"]
    init: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    environment: *hashcrush-env
    command: ["gunicorn", "--config", "/app/docker/gunicorn.conf.py", "wsgi:app"]
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - hashcrush-storage:/var/lib/hashcrush
      - hashcrush-runtime:/tmp/hashcrush-runtime
      - type: bind
        source: ${HASHCRUSH_EXTERNAL_WORDLISTS_HOST_PATH:?Set HASHCRUSH_EXTERNAL_WORDLISTS_HOST_PATH in .env}
        target: /mnt/hashcrush-wordlists
        read_only: true
      - type: bind
        source: ${HASHCRUSH_HIBP_DATASETS_HOST_PATH:?Set HASHCRUSH_HIBP_DATASETS_HOST_PATH in .env}
        target: /mnt/hashcrush-hibp
        read_only: true
      - type: bind
        source: ${HASHCRUSH_RULES_HOST_PATH:?Set HASHCRUSH_RULES_HOST_PATH in .env}
        target: /mnt/hashcrush-rules
        read_only: true

  nginx-test:
    image: nginx:1.27-alpine
    profiles: ["test"]
    init: true
    restart: unless-stopped
    depends_on:
      web-test:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-check-certificate -q -O /dev/null https://127.0.0.1/healthz || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - hashcrush-ssl:/etc/hashcrush/ssl:ro
      - ./docker/nginx/test.conf:/etc/nginx/conf.d/default.conf:ro

  upload-worker:
    build:
      context: .
    init: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    environment:
      <<: *hashcrush-env
      HASHCRUSH_ENABLE_INLINE_UPLOAD_WORKER: 0
    command:
      [
        "python3",
        "./hashcrush.py",
        "upload-worker",
        "--poll-interval",
        "${HASHCRUSH_UPLOAD_WORKER_POLL_INTERVAL_SECONDS:-2}",
      ]
    healthcheck:
      test: ["CMD", "python3", "/app/docker/upload_worker_healthcheck.py"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - hashcrush-storage:/var/lib/hashcrush
      - hashcrush-runtime:/tmp/hashcrush-runtime
      - type: bind
        source: ${HASHCRUSH_EXTERNAL_WORDLISTS_HOST_PATH:?Set HASHCRUSH_EXTERNAL_WORDLISTS_HOST_PATH in .env}
        target: /mnt/hashcrush-wordlists
        read_only: true
      - type: bind
        source: ${HASHCRUSH_HIBP_DATASETS_HOST_PATH:?Set HASHCRUSH_HIBP_DATASETS_HOST_PATH in .env}
        target: /mnt/hashcrush-hibp
        read_only: true
      - type: bind
        source: ${HASHCRUSH_RULES_HOST_PATH:?Set HASHCRUSH_RULES_HOST_PATH in .env}
        target: /mnt/hashcrush-rules
        read_only: true

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        HASHCRUSH_HASHCAT_VERSION: ${HASHCRUSH_HASHCAT_VERSION:-7.1.2}
    init: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    environment:
      <<: *hashcrush-env
      NVIDIA_VISIBLE_DEVICES: ${HASHCRUSH_NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${HASHCRUSH_NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      HASHCRUSH_WORKER_HEARTBEAT_MAX_AGE_SECONDS: ${HASHCRUSH_WORKER_HEARTBEAT_MAX_AGE_SECONDS:-30}
    command: ["python3", "./hashcrush.py", "worker"]
    healthcheck:
      test: ["CMD", "python3", "/app/docker/worker_healthcheck.py"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - hashcrush-storage:/var/lib/hashcrush
      - hashcrush-runtime:/tmp/hashcrush-runtime
      - type: bind
        source: ${HASHCRUSH_EXTERNAL_WORDLISTS_HOST_PATH:?Set HASHCRUSH_EXTERNAL_WORDLISTS_HOST_PATH in .env}
        target: /mnt/hashcrush-wordlists
        read_only: true
      - type: bind
        source: ${HASHCRUSH_HIBP_DATASETS_HOST_PATH:?Set HASHCRUSH_HIBP_DATASETS_HOST_PATH in .env}
        target: /mnt/hashcrush-hibp
        read_only: true
      - type: bind
        source: ${HASHCRUSH_RULES_HOST_PATH:?Set HASHCRUSH_RULES_HOST_PATH in .env}
        target: /mnt/hashcrush-rules
        read_only: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
      args:
        HASHCRUSH_POSTGRES_MAJOR: ${HASHCRUSH_POSTGRES_MAJOR:-16}
    profiles: ["test"]
    init: true
    restart: "no"
    shm_size: 1gb
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *hashcrush-env
      HASHCRUSH_TEST_POSTGRES_URI: "postgresql+psycopg://${POSTGRES_USER:-hashcrush}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-hashcrush}"
      HASHCRUSH_E2E_MODE: local
      PYTHONPATH: /app
    command: *docker-test-command

  test-external:
    build:
      context: .
      dockerfile: Dockerfile.test
      args:
        HASHCRUSH_POSTGRES_MAJOR: ${HASHCRUSH_POSTGRES_MAJOR:-16}
    profiles: ["test"]
    init: true
    restart: "no"
    shm_size: 1gb
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
      nginx-test:
        condition: service_healthy
      upload-worker:
        condition: service_healthy
      worker:
        condition: service_healthy
    environment:
      <<: *hashcrush-env
      HASHCRUSH_TEST_POSTGRES_URI: "postgresql+psycopg://${POSTGRES_USER:-hashcrush}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-hashcrush}"
      HASHCRUSH_E2E_MODE: external
      HASHCRUSH_E2E_BASE_URL: https://nginx-test
      HASHCRUSH_E2E_VERIFY_TLS: 0
      HASHCRUSH_E2E_USERNAME: ${HASHCRUSH_INITIAL_ADMIN_USERNAME:-admin}
      HASHCRUSH_E2E_PASSWORD: ${HASHCRUSH_INITIAL_ADMIN_PASSWORD:?Set HASHCRUSH_INITIAL_ADMIN_PASSWORD in .env}
      PYTHONPATH: /app
    command: *docker-test-command

volumes:
  hashcrush-postgres:
  hashcrush-storage:
  hashcrush-runtime:
  hashcrush-ssl:
