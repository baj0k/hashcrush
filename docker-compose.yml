services:
  app:
    build: .
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    links:
      - db
    environment:
      HASHCRUSH_DATABASE_URI: postgresql+psycopg2://hashcrush:hashcrush@db:5432/hashcrush
      HASHCRUSH_SECRET_KEY: change-me
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: "postgres:17-bookworm"
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    restart: always
    environment:
      POSTGRES_DB: hashcrush
      POSTGRES_USER: hashcrush
      POSTGRES_PASSWORD: hashcrush
    ports:
      - "5432:5432"
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hashcrush -d hashcrush"]
      timeout: 20s
      retries: 10

volumes:
  db:
    driver: local
